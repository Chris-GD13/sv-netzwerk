name: SV-Netzwerk bereitstellen

on:
  push:
    branches:
      - main
    paths:
      - "sv-netzwerk/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-sv-netzwerk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: sv-netzwerk

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js 22 LTS einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sv-netzwerk/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Laufzeitumgebung prüfen
        run: |
          echo "Runner: $RUNNER_OS"
          echo "Arbeitsverzeichnis: $(pwd)"
          node --version
          npm --version
          npm config get registry
          test -f package.json
          test -f package-lock.json

      - name: Abhängigkeiten reproduzierbar installieren
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          NPM_CONFIG_AUDIT: "false"
          NPM_CONFIG_FUND: "false"
          NPM_CONFIG_PROGRESS: "false"
          NPM_CONFIG_FETCH_RETRIES: "2"
          NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "10000"
          NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "30000"
        run: npm ci --no-audit --no-fund --loglevel=notice

      - name: Astro-Projekt prüfen und bauen
        run: npm run build

      - name: Build-Ausgabe prüfen
        run: |
          test -d dist
          test -n "$(find dist -type f -print -quit)"
          test -f dist/deploy-version.txt
          grep -Fx "Commit: $GITHUB_SHA" dist/deploy-version.txt
          grep -Fx "Version: Homepage-v4" dist/deploy-version.txt
          echo "Build erfolgreich; erzeugte Dateien:"
          find dist -type f | sort | head -n 100

      - name: SFTP-Werkzeug installieren
        run: |
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Document Root der Domain ermitteln
        id: document-root
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          live_index="$(mktemp)"
          remote_files="$(mktemp)"
          candidate_index="$(mktemp)"
          trap 'rm -f "$live_index" "$remote_files" "$candidate_index"' EXIT

          curl --fail --silent --show-error --retry 5 --retry-delay 10 --retry-all-errors \
            https://sv-netzwerk.eu/ --output "$live_index"
          live_hash="$(sha256sum "$live_index" | cut -d ' ' -f 1)"

          lftp -u "$SFTP_USERNAME,$SFTP_PASSWORD" -p "$SFTP_PORT" "sftp://$SFTP_HOST" \
            -e "set sftp:auto-confirm yes; find .; bye" > "$remote_files"
          mapfile -t remote_indexes < <(grep -E '(^|/)index\.html$' "$remote_files")

          matches=()
          for remote_index in "${remote_indexes[@]}"; do
            lftp -u "$SFTP_USERNAME,$SFTP_PASSWORD" -p "$SFTP_PORT" "sftp://$SFTP_HOST" \
              -e "set sftp:auto-confirm yes; get \"$remote_index\" -o \"$candidate_index\"; bye" \
              > /dev/null
            candidate_hash="$(sha256sum "$candidate_index" | cut -d ' ' -f 1)"
            if [ "$candidate_hash" = "$live_hash" ]; then
              matches+=("$remote_index")
            fi
          done

          if [ "${#matches[@]}" -ne 1 ]; then
            echo "::error::Document Root nicht eindeutig: ${#matches[@]} passende index.html-Dateien gefunden."
            exit 1
          fi

          remote_dir="${matches[0]%index.html}"
          printf 'remote_dir=%s\n' "$remote_dir" >> "$GITHUB_OUTPUT"
          echo "Ermitteltes Document Root: $remote_dir"

      - name: Zu IONOS per SFTP übertragen
        if: success()
        uses: Dylan700/sftp-upload-action@v1.2.3
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          uploads: |
            sv-netzwerk/dist/ => ${{ steps.document-root.outputs.remote_dir }}

      - name: Deployment online verifizieren
        if: success()
        working-directory: sv-netzwerk
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          response="$(curl --fail --silent --show-error --retry 5 --retry-delay 10 --retry-all-errors \
            https://sv-netzwerk.eu/deploy-version.txt)"
          printf '%s\n' "$response"

          actual_sha="$(printf '%s\n' "$response" | sed -n 's/^Commit:[[:space:]]*//p' | head -n 1)"
          if [ "$actual_sha" != "$EXPECTED_SHA" ]; then
            echo "::error::Online-Commit $actual_sha stimmt nicht mit $EXPECTED_SHA überein."
            exit 1
          fi
