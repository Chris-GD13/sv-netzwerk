name: SV-Netzwerk bereitstellen

on:
  push:
    branches:
      - main
    paths:
      - "sv-netzwerk/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-sv-netzwerk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SFTP_REMOTE_DIR: /sv-netzwerk

    defaults:
      run:
        working-directory: sv-netzwerk

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js 22 LTS einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sv-netzwerk/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Laufzeitumgebung prüfen
        run: |
          echo "Runner: $RUNNER_OS"
          echo "Arbeitsverzeichnis: $(pwd)"
          node --version
          npm --version
          npm config get registry
          test -f package.json
          test -f package-lock.json

      - name: Abhängigkeiten reproduzierbar installieren
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          NPM_CONFIG_AUDIT: "false"
          NPM_CONFIG_FUND: "false"
          NPM_CONFIG_PROGRESS: "false"
          NPM_CONFIG_FETCH_RETRIES: "2"
          NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "10000"
          NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "30000"
        run: npm ci --no-audit --no-fund --loglevel=notice

      - name: Astro-Projekt prüfen und bauen
        run: npm run build

      - name: Build-Ausgabe prüfen
        run: |
          test -d dist
          test -n "$(find dist -type f -print -quit)"
          test -f dist/deploy-version.txt
          grep -Fx "Commit: $GITHUB_SHA" dist/deploy-version.txt
          grep -Fx "Version: Homepage-v5" dist/deploy-version.txt
          echo "Build erfolgreich; erzeugte Dateien:"
          find dist -type f | sort | head -n 100

      - name: SFTP-Werkzeug installieren
        run: |
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Document Root vor dem Upload prüfen
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          listing="$(lftp -u "$SFTP_USERNAME,$SFTP_PASSWORD" -p "$SFTP_PORT" "sftp://$SFTP_HOST" \
            -e "set sftp:auto-confirm yes; cls -1F $SFTP_REMOTE_DIR; bye")"
          printf '%s\n' "$listing"

          if printf '%s\n' "$listing" | grep -Eq '(^|/)dist/$'; then
            echo "::error::$SFTP_REMOTE_DIR/dist/ existiert bereits. Upload wird abgebrochen."
            exit 1
          fi

      - name: Inhalt von dist nach IONOS übertragen
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          lftp -u "$SFTP_USERNAME,$SFTP_PASSWORD" -p "$SFTP_PORT" "sftp://$SFTP_HOST" \
            -e "set sftp:auto-confirm yes; mirror --reverse --verbose --parallel=4 --delete dist/ $SFTP_REMOTE_DIR/; bye"

      - name: Inhalt des Document Root prüfen
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          listing="$(lftp -u "$SFTP_USERNAME,$SFTP_PASSWORD" -p "$SFTP_PORT" "sftp://$SFTP_HOST" \
            -e "set sftp:auto-confirm yes; cls -1F $SFTP_REMOTE_DIR; bye")"
          printf '%s\n' "$listing"

          printf '%s\n' "$listing" | grep -Eq '(^|/)index\.html$'
          printf '%s\n' "$listing" | grep -Eq '(^|/)assets/$'
          printf '%s\n' "$listing" | grep -Eq '(^|/)deploy-version\.txt$'

          if printf '%s\n' "$listing" | grep -Eq '(^|/)dist/$'; then
            echo "::error::$SFTP_REMOTE_DIR/dist/ wurde unerwartet angelegt."
            exit 1
          fi

      - name: Deployment online verifizieren
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          response="$(curl --location --fail --silent --show-error --retry 5 --retry-delay 10 --retry-all-errors \
            https://www.sv-netzwerk.eu/deploy-version.txt)"
          test -n "$response"
          printf '%s\n' "$response"

          actual_sha="$(printf '%s\n' "$response" | sed -n 's/^Commit:[[:space:]]*//p' | head -n 1)"
          if [ "$actual_sha" != "$EXPECTED_SHA" ]; then
            echo "::error::Online-Commit $actual_sha stimmt nicht mit $EXPECTED_SHA überein."
            exit 1
          fi
