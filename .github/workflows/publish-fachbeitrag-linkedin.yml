name: Fachbeitrag verĂ¶ffentlichen & LinkedIn posten

on:
  schedule:
    # Montag und Freitag um 05:30 Berlin-Zeit (Europe/Berlin)
    # Cron ist UTC: 03:30 UTC im Winter (UTC+1), 04:30 UTC im Sommer (UTC+2)
    # Wir verwenden 04:30 UTC als KompromiĂź (nĂ¤her am gewĂĽnschten 05:30 Berlin)
    - cron: '30 4 * * 1,5'  # Montag (1) und Freitag (5) um 04:30 UTC
  workflow_dispatch:  # Manuelle AuslĂ¶sung erlaubt

jobs:
  publish_and_notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Get latest Fachbeitrag metadata
        id: latest_fachbeitrag
        run: |
          cd sv-netzwerk
          
          # Finde die neueste Fachbeitrag-Datei
          LATEST_FILE=$(find src/content/knowledge -maxdepth 1 -name '*.md' -type f ! -name 'svos-foundation.md' | sort | tail -1)
          
          if [ -z "$LATEST_FILE" ]; then
            echo "error=no_fachbeitrag_found" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Extrahiere Metadaten
          TITLE=$(grep -m 1 '^title:' "$LATEST_FILE" | sed 's/^title: *"//' | sed 's/"$//')
          DESCRIPTION=$(grep -m 1 '^description:' "$LATEST_FILE" | sed 's/^description: *"//' | sed 's/"$//')
          SLUG=$(basename "$LATEST_FILE" .md)
          TAGS=$(grep '^tags:' "$LATEST_FILE" | sed 's/^tags: *\[//' | sed 's/\]$//' | sed 's/"//g' | sed 's/, /|/g')
          DATE=$(grep -m 1 '^pubDate:' "$LATEST_FILE" | sed 's/^pubDate: *\[//' | sed 's/\].*//' | sed 's/"//g')
          
          # Extrahiere den ersten Absatz (erste ~300 Zeichen nach dem Frontmatter)
          FIRST_PARAGRAPH=$(tail -n +26 "$LATEST_FILE" | head -20 | grep -v '^$' | head -1 | cut -c1-280)
          
          # Generiere Hashtags aus Tags
          HASHTAGS=$(echo "$TAGS" | sed 's/|/ #/g' | sed 's/^/#/')
          
          # URL zusammenbauen
          URL="https://sv-netzwerk.eu/fachwissen/$SLUG/"
          
          # Ausgaben setzen
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "first_paragraph=$FIRST_PARAGRAPH" >> $GITHUB_OUTPUT
          echo "hashtags=$HASHTAGS" >> $GITHUB_OUTPUT
          echo "file=$LATEST_FILE" >> $GITHUB_OUTPUT
      
      - name: Fetch image from Unsplash
        id: unsplash_image
        run: |
          UNSPLASH_KEY="${{ secrets.UNSPLASH_ACCESS_KEY }}"
          SEARCH_TERM="${{ steps.latest_fachbeitrag.outputs.title }}"
          
          # Suche Bild bei Unsplash
          RESPONSE=$(curl -s "https://api.unsplash.com/search/photos?query=$SEARCH_TERM&per_page=1&client_id=$UNSPLASH_KEY")
          
          # Extrahiere die beste passende Bild-URL
          IMAGE_URL=$(echo "$RESPONSE" | jq -r '.results[0].urls.regular // empty')
          
          if [ -z "$IMAGE_URL" ] || [ "$IMAGE_URL" = "null" ]; then
            echo "warning=no_unsplash_image_found, using generic image" >> $GITHUB_OUTPUT
            IMAGE_URL="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=1200&h=630&fit=crop"
          fi
          
          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT
          echo "âś… Image URL: $IMAGE_URL"
      
      - name: Validate build
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
      
      - name: Trigger Zapier webhook (LinkedIn post)
        if: success()
        run: |
          WEBHOOK_URL="${{ secrets.ZAPIER_WEBHOOK_URL }}"
          
          if [ -z "$WEBHOOK_URL" ]; then
            echo "WARNING: ZAPIER_WEBHOOK_URL secret not set"
            exit 0
          fi
          
          PAYLOAD=$(cat <<'EOF'
          {
            "title": "${{ steps.latest_fachbeitrag.outputs.title }}",
            "description": "${{ steps.latest_fachbeitrag.outputs.description }}",
            "first_paragraph": "${{ steps.latest_fachbeitrag.outputs.first_paragraph }}",
            "hashtags": "${{ steps.latest_fachbeitrag.outputs.hashtags }}",
            "image_url": "${{ steps.unsplash_image.outputs.image_url }}",
            "url": "${{ steps.latest_fachbeitrag.outputs.url }}",
            "date": "${{ steps.latest_fachbeitrag.outputs.date }}",
            "slug": "${{ steps.latest_fachbeitrag.outputs.slug }}"
          }
          EOF
          )
          
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --retry 3 \
            --retry-delay 2
          
          echo "âś… LinkedIn webhook triggered with image"
      
      - name: Deploy to GitHub Pages (if needed)
        run: |
          # Dieser Schritt ist optional â€” ruf deine deploy-Logik hier auf
          # Falls vorhanden: npm run deploy
          echo "âś… Build complete â€” ready for deployment"

  notify_on_failure:
    runs-on: ubuntu-latest
    needs: publish_and_notify
    if: failure()
    
    steps:
      - name: Notify failure
        run: |
          echo "âš ď¸Ź Fachbeitrag-VerĂ¶ffentlichung fehlgeschlagen"
          echo "Bitte manuell prĂĽfen: https://github.com/${{ github.repository }}/actions"
