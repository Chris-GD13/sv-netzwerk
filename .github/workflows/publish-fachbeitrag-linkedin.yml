name: Fachbeitrag veröffentlichen & LinkedIn posten

on:
  schedule:
    # Montag und Freitag um 05:30 Berlin-Zeit (Europe/Berlin)
    # Cron ist UTC: 03:30 UTC im Winter (UTC+1), 04:30 UTC im Sommer (UTC+2)
    # Wir verwenden 04:30 UTC als Kompromiß (näher am gewünschten 05:30 Berlin)
    - cron: '30 4 * * 1,5'  # Montag (1) und Freitag (5) um 04:30 UTC
  workflow_dispatch:  # Manuelle Auslösung erlaubt
    inputs:
      article_slug:
        description: "Optionaler Slug für gezielte Veröffentlichung (z. B. kumulschaeden-in-der-region-priorisierung-koordination-dokumentation)"
        required: false
        type: string

jobs:
  publish_and_notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'sv-netzwerk/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Get latest Fachbeitrag metadata
        id: latest_fachbeitrag
        run: |
          cd sv-netzwerk

          SELECTED_SLUG="${{ github.event.inputs.article_slug }}"

          if [ -n "$SELECTED_SLUG" ]; then
            # Harte Validierung: bei gesetztem Input muss die Datei exakt existieren
            if ! echo "$SELECTED_SLUG" | grep -Eq '^[a-z0-9]+(-[a-z0-9]+)*$'; then
              echo "error=invalid_article_slug" >> $GITHUB_OUTPUT
              echo "Invalid article_slug: $SELECTED_SLUG"
              exit 1
            fi

            LATEST_FILE="src/content/knowledge/${SELECTED_SLUG}.md"
            if [ ! -f "$LATEST_FILE" ]; then
              echo "error=article_slug_not_found" >> $GITHUB_OUTPUT
              echo "Article not found for slug: $SELECTED_SLUG"
              exit 1
            fi
          else
            # Finde die neueste Fachbeitrag-Datei (bestehendes Verhalten)
            LATEST_FILE=$(find src/content/knowledge -maxdepth 1 -name '*.md' -type f ! -name 'svos-foundation.md' | sort | tail -1)
          fi
          
          if [ -z "$LATEST_FILE" ]; then
            echo "error=no_fachbeitrag_found" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Extrahiere Metadaten
          TITLE=$(grep -m 1 '^title:' "$LATEST_FILE" | sed 's/^title: *"//' | sed 's/"$//')
          DESCRIPTION=$(grep -m 1 '^description:' "$LATEST_FILE" | sed 's/^description: *"//' | sed 's/"$//')
          SLUG=$(basename "$LATEST_FILE" .md)
          TAGS=$(grep '^tags:' "$LATEST_FILE" | sed 's/^tags: *\[//' | sed 's/\]$//' | sed 's/"//g' | sed 's/, /|/g')
          DATE=$(grep -m 1 '^  publishedAt:' "$LATEST_FILE" | sed 's/^  publishedAt: *//')
          if [ -z "$DATE" ]; then
            DATE=$(grep -m 1 '^pubDate:' "$LATEST_FILE" | sed 's/^pubDate: *\[//' | sed 's/\].*//' | sed 's/"//g')
          fi
          
          # Extrahiere den ersten Absatz (erste ~300 Zeichen nach dem Frontmatter)
          FIRST_PARAGRAPH=$(tail -n +26 "$LATEST_FILE" | head -20 | grep -v '^$' | head -1 | cut -c1-280)
          
          # Generiere Hashtags aus Tags
          HASHTAGS=$(echo "$TAGS" | sed 's/|/ #/g' | sed 's/^/#/')
          
          # URL zusammenbauen
          URL="https://sv-netzwerk.eu/fachwissen/$SLUG/"
          
          # Ausgaben setzen
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "first_paragraph=$FIRST_PARAGRAPH" >> $GITHUB_OUTPUT
          echo "hashtags=$HASHTAGS" >> $GITHUB_OUTPUT
          echo "file=$LATEST_FILE" >> $GITHUB_OUTPUT
          echo "Using article file: $LATEST_FILE"
      
      - name: Fetch realistic field image from Unsplash
        id: unsplash_image
        run: |
          UNSPLASH_KEY="${{ secrets.UNSPLASH_ACCESS_KEY }}"
          TITLE="${{ steps.latest_fachbeitrag.outputs.title }}"
          TAGS="${{ steps.latest_fachbeitrag.outputs.tags }}"
          TAG_QUERY="$(echo "$TAGS" | tr '|' ' ' | sed 's/[^[:alnum:]äöüÄÖÜß -]//g')"
          SEARCH_TERM="Deutschland Unwetterschaden Schadenaufnahme Ausseneinsatz ${TAG_QUERY} ${TITLE}"
          IMAGE_BRIEF="Realistische Einsatzsituation in Deutschland: ueberflutete Gebaeude, Hagel- oder Sturmschaeden, technische Aufnahme vor Ort oder Teamarbeit in der Schadenkoordination."
          IMAGE_EXCLUSIONS="Keine uebertriebenen Katastrophenszenen, keine unrealistischen KI-Motive, keine sensationale Bildsprache."
          
          # Suche Bild bei Unsplash mit fokusbezogenen Kriterien
          RESPONSE=$(curl -sG "https://api.unsplash.com/search/photos" \
            --data-urlencode "query=$SEARCH_TERM" \
            --data "per_page=8" \
            --data "orientation=landscape" \
            --data "content_filter=high" \
            --data "client_id=$UNSPLASH_KEY")
          
          # Priorisiere realistische Einsatzmotive
          IMAGE_URL=$(echo "$RESPONSE" | jq -r '
            .results[]
            | select(
                ((.alt_description // "") | test("flood|storm|hail|wind|building|inspection|damage|water"; "i"))
                or
                ((.description // "") | test("flood|storm|hail|wind|building|inspection|damage|water"; "i"))
              )
            | .urls.regular
          ' | head -1)
          if [ -z "$IMAGE_URL" ] || [ "$IMAGE_URL" = "null" ]; then
            IMAGE_URL=$(echo "$RESPONSE" | jq -r '.results[0].urls.regular // empty')
          fi
          
          if [ -z "$IMAGE_URL" ] || [ "$IMAGE_URL" = "null" ]; then
            echo "warning=no_unsplash_image_found, using fallback image" >> $GITHUB_OUTPUT
            IMAGE_URL="https://images.unsplash.com/photo-1527482797697-8795b05a13fe?w=1200&h=630&fit=crop"
          fi
          
          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT
          echo "image_brief=$IMAGE_BRIEF" >> $GITHUB_OUTPUT
          echo "image_exclusions=$IMAGE_EXCLUSIONS" >> $GITHUB_OUTPUT
          echo "✅ Image URL: $IMAGE_URL"
      
      - name: Validate build
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
      
      - name: Trigger Zapier webhook (LinkedIn post)
        if: success()
        run: |
          WEBHOOK_URL="${{ secrets.ZAPIER_WEBHOOK_URL }}"
          
          if [ -z "$WEBHOOK_URL" ]; then
            echo "WARNING: ZAPIER_WEBHOOK_URL secret not set"
            exit 0
          fi
          
          PAYLOAD=$(cat <<'EOF'
          {
            "title": "${{ steps.latest_fachbeitrag.outputs.title }}",
            "description": "${{ steps.latest_fachbeitrag.outputs.description }}",
            "first_paragraph": "${{ steps.latest_fachbeitrag.outputs.first_paragraph }}",
            "hashtags": "${{ steps.latest_fachbeitrag.outputs.hashtags }}",
            "image_url": "${{ steps.unsplash_image.outputs.image_url }}",
            "image_brief": "${{ steps.unsplash_image.outputs.image_brief }}",
            "image_exclusions": "${{ steps.unsplash_image.outputs.image_exclusions }}",
            "url": "${{ steps.latest_fachbeitrag.outputs.url }}",
            "date": "${{ steps.latest_fachbeitrag.outputs.date }}",
            "slug": "${{ steps.latest_fachbeitrag.outputs.slug }}"
          }
          EOF
          )
          
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --retry 3 \
            --retry-delay 2
          
          echo "✅ LinkedIn webhook triggered with image"
      
      - name: Deploy to GitHub Pages (if needed)
        run: |
          # Dieser Schritt ist optional — ruf deine deploy-Logik hier auf
          # Falls vorhanden: npm run deploy
          echo "✅ Build complete — ready for deployment"

  notify_on_failure:
    runs-on: ubuntu-latest
    needs: publish_and_notify
    if: failure()
    
    steps:
      - name: Notify failure
        run: |
          echo "⚠️ Fachbeitrag-Veröffentlichung fehlgeschlagen"
          echo "Bitte manuell prüfen: https://github.com/${{ github.repository }}/actions"
