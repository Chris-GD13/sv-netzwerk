name: Fachbeitrags-Automation

on:
  schedule:
    # Morgenslot 05:15-06:40 Europe/Berlin (DST-sicher via duale UTC-Crons)
    - cron: "20 3 * * *"  # Sommerzeit (CEST, UTC+2)
    - cron: "20 4 * * *"  # Winterzeit (CET, UTC+1)
    # Nachmittagsslot 16:15-17:30 Europe/Berlin (DST-sicher via duale UTC-Crons)
    - cron: "20 14 * * *" # Sommerzeit (CEST, UTC+2)
    - cron: "20 15 * * *" # Winterzeit (CET, UTC+1)
  workflow_dispatch:
    inputs:
      slot:
        description: "Erzwingt Zeitfenster (morning|afternoon); leer = automatische Slot-Erkennung"
        required: false
        type: choice
        options:
          - morning
          - afternoon
      force:
        description: "Zeitfenster-/Duplikatschutz für Notfalllauf übersteuern"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: fachbeitrag-automation-main
  cancel-in-progress: false

jobs:
  publish-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: sv-netzwerk
    env:
      TZ: Europe/Berlin
      FACHBEITRAG_AUTOMATION_ENABLED: ${{ vars.FACHBEITRAG_AUTOMATION_ENABLED || 'true' }}

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js 22 LTS einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sv-netzwerk/package-lock.json

      - name: Automationsschalter prüfen
        if: env.FACHBEITRAG_AUTOMATION_ENABLED != 'true'
        run: |
          echo "Fachbeitrags-Automation ist deaktiviert (Repo-Variable FACHBEITRAG_AUTOMATION_ENABLED)."
          exit 0

      - name: Abhängigkeiten installieren
        run: npm ci --no-audit --no-fund

      - name: Fachbeitrag erzeugen
        id: generate
        run: |
          FORCE_ARG=""
          SLOT_ARG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            FORCE_ARG="--force"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.slot }}" ]; then
            SLOT_ARG="--slot=${{ inputs.slot }}"
          fi
          node scripts/run-fachbeitrag-automation.mjs $SLOT_ARG $FORCE_ARG
          STATUS="$(node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('.automation/latest-publication.json','utf8'));process.stdout.write(data.status||'')")"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "generated" ]; then
            node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('.automation/latest-publication.json','utf8'));console.log('BERLIN_DATE='+data.berlinDate);console.log('PUBLICATION_ID='+data.publicationId);console.log('PUBLICATION_URL='+data.articleUrl);console.log('PUBLICATION_TITLE='+data.title.replace(/\n/g,' '));console.log('PUBLICATION_IMAGE_URL='+data.imageUrl);console.log('PUBLICATION_SLUG='+data.slug);console.log('PUBLICATION_SLOT='+data.slot);" >> "$GITHUB_ENV"
          fi

      - name: Bei Slot-Skip sauber beenden
        if: steps.generate.outputs.status != 'generated'
        run: echo "Kein Beitrag erzeugt (außerhalb Zeitfenster oder Slot bereits veröffentlicht)."

      - name: Vorprüfung
        if: steps.generate.outputs.status == 'generated'
        run: node scripts/validate-fachbeitrag-preflight.mjs "$BERLIN_DATE"

      - name: Fachbeiträge validieren
        if: steps.generate.outputs.status == 'generated'
        run: npm run validate:knowledge -- "$BERLIN_DATE"

      - name: Build ausführen
        if: steps.generate.outputs.status == 'generated'
        run: npm run build

      - name: Build-Integration prüfen
        if: steps.generate.outputs.status == 'generated'
        run: npm run validate:knowledge -- --dist "$BERLIN_DATE"

      - name: Commit und Push
        if: steps.generate.outputs.status == 'generated'
        run: |
          if git diff --quiet; then
            echo "Keine Änderungen erzeugt."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: publish fachbeitrag ${BERLIN_DATE} ${PUBLICATION_SLOT}"
          git push origin HEAD:main
          echo "PUBLISHED_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Live-URL prüfen
        if: steps.generate.outputs.status == 'generated'
        run: |
          echo "Prüfe Live-URL: $PUBLICATION_URL"
          ok=0
          for i in {1..24}; do
            status="$(curl -L -s -o /tmp/page.html -w '%{http_code}' "$PUBLICATION_URL" || true)"
            if [ "$status" = "200" ] && grep -qi "$PUBLICATION_SLUG" /tmp/page.html; then
              ok=1
              break
            fi
            sleep 20
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Live-URL nicht erreichbar oder Inhalt noch nicht aktuell: $PUBLICATION_URL"
            exit 1
          fi

      - name: LinkedIn-Zap auslösen (nach erfolgreichem Live-Check)
        if: steps.generate.outputs.status == 'generated'
        env:
          WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::ZAPIER_WEBHOOK_URL fehlt."
            exit 1
          fi
          LINKEDIN_TEXT_FILE="src/content/linkedin/${BERLIN_DATE}_${PUBLICATION_SLUG}.txt"
          FIRST_PARAGRAPH="$(head -n 8 "$LINKEDIN_TEXT_FILE" | tr '\n' ' ' | sed 's/"/\\"/g' | cut -c1-280)"
          HASHTAGS="$(grep -Eo '#[[:alnum:]ÄÖÜäöüß]+' "$LINKEDIN_TEXT_FILE" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g' | sed 's/[[:space:]]$//')"
          DESCRIPTION="$(node -e "const fs=require('fs');const raw=fs.readFileSync('src/content/knowledge/${PUBLICATION_SLUG}.md','utf8');const d=(raw.match(/^description:\s*\"([^\"]+)\"/m)||[])[1]||'';process.stdout.write(d.replace(/\n/g,' '));")"
          PAYLOAD="$(cat <<EOF
          {
            "title": "${PUBLICATION_TITLE}",
            "description": "${DESCRIPTION}",
            "first_paragraph": "${FIRST_PARAGRAPH}",
            "hashtags": "${HASHTAGS}",
            "image_url": "${PUBLICATION_IMAGE_URL}",
            "url": "${PUBLICATION_URL}",
            "date": "${BERLIN_DATE}",
            "slug": "${PUBLICATION_SLUG}",
            "publication_id": "${PUBLICATION_ID}"
          }
          EOF
          )"
          curl --fail --show-error --silent -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --retry 5 --retry-delay 5 --retry-all-errors
