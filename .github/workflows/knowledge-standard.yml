name: Fachwissensstandard

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "sv-netzwerk/src/content/knowledge/**"
      - "sv-netzwerk/scripts/validate-knowledge.mjs"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sv-netzwerk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sv-netzwerk/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run validate:knowledge
