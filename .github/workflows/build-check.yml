name: Build Check

on:
  push:
    branches:
      - main
    paths:
      - "sv-netzwerk/**"
      - ".github/workflows/build-check.yml"
  pull_request:
    paths:
      - "sv-netzwerk/**"
      - ".github/workflows/build-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sv-netzwerk

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sv-netzwerk/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Astro-Website bauen
        run: npm run build

      - name: Build-Ausgabe prüfen
        run: |
          test -d dist
          test -n "$(find dist -type f -print -quit)"
          echo "Build erfolgreich; erzeugte Dateien:"
          find dist -type f | sort | head -n 50
