name: HTML Validator

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sv-netzwerk

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sv-netzwerk/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Website bauen
        run: npm run build

      - name: HTML-Dateien validieren
        run: npx --yes html-validate@9 "dist/**/*.html"
